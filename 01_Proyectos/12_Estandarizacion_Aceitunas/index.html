<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto: Estandarización: Envasado de Aceitunas - Sabor Pampeano</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root { --sp-green: #4A5D23; --sp-green-light: #7A9B3A; --sp-accent: #C5D6A0; --sp-bg: #f4f3ec; --text-dark: #1a2410; --text-muted: #6b7a52; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--sp-bg); color: var(--text-dark); line-height: 1.6; padding: 40px 20px; }
.container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid rgba(74, 93, 35, 0.1); text-align: center; }
.icon { font-size: 60px; color: var(--sp-green); margin-bottom: 20px; }
h1 { font-size: 32px; font-weight: 800; color: var(--sp-green); margin-bottom: 10px; }
p.desc { font-size: 16px; color: var(--text-muted); margin-bottom: 40px; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; background: var(--sp-green); color: #fff; transition: all 0.2s; }
.btn:hover { background: var(--sp-green-light); transform: scale(1.02); }
</style>
</head>
<body>
<div class="container">
  <i class="fas fa-seedling icon"></i>
  <h1>Estandarización: Envasado de Aceitunas</h1>
  <p class="desc">Carpeta de proyecto y documentación técnica. Este espacio está destinado a almacenar pliegos, manuales y archivos asociados a la iniciativa.</p>
  <a href="javascript:history.back()" class="btn"><i class="fas fa-arrow-left"></i> Volver al Dashboard</a>
</div>
</body>
</html>
