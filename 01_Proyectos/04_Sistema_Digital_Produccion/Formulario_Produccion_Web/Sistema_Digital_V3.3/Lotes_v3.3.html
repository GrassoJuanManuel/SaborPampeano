<!DOCTYPE html>
<html>
<head>
<base target="_top">
<title>Tabla de Lotes - Sabor Pampeano</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
:root{--primary:#4A5D23;--secondary:#C5D6A0;--accent:#7A9B3A;--bg:#f8f8f4;--white:#fff;--text:#333;--border:#d4d4c8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);padding:0;min-height:100vh}
.page{max-width:800px;margin:0 auto;background:var(--white);min-height:100vh;box-shadow:0 0 30px rgba(0,0,0,.08);padding:40px 35px}
.header{text-align:center;border-bottom:3px solid var(--primary);padding-bottom:20px;margin-bottom:30px}
.header h1{color:var(--primary);font-size:22px;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.header p{color:#888;font-size:13px;margin-top:5px}
.badge{display:inline-block;background:var(--secondary);color:var(--primary);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;margin-top:8px}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
thead th{background:var(--primary);color:var(--white);padding:12px 10px;text-align:left;font-weight:600;font-size:13px;letter-spacing:.3px;border:1px solid #3a4a1a}
tbody td{padding:10px;border:1px solid var(--border);vertical-align:middle}
tbody tr:nth-child(even){background:#fafaf5}
tbody tr:hover{background:#f0f0e0;transition:background .15s}
.product-name{font-weight:600;color:var(--primary)}
.lote-num{font-family:'Courier New',monospace;font-weight:600;font-size:13px;color:#555;text-align:center}
.empty-state{text-align:center;padding:60px 20px;color:#999}
.empty-state svg{width:64px;height:64px;margin-bottom:15px;opacity:.4}
#loader{text-align:center;padding:80px 20px}
.spinner{border:4px solid rgba(0,0,0,.1);width:40px;height:40px;border-radius:50%;border-left-color:var(--primary);animation:spin 1s linear infinite;margin:0 auto 15px}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.footer{text-align:center;margin-top:30px;padding-top:15px;border-top:1px solid var(--border);font-size:11px;color:#aaa}
.error-msg{color:#e74c3c;text-align:center;padding:40px;font-weight:600}
@media(max-width:600px){
  .page{padding:20px 15px}
  table{font-size:12px}
  thead th{padding:8px 6px;font-size:11px}
  tbody td{padding:7px 6px}
  .header h1{font-size:18px}
}
@media print{
  body{background:#fff}
  .page{box-shadow:none;padding:20px}
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>SABOR PAMPEANO</h1>
    <p>Tabla de Lotes de Productos</p>
    <span class="badge" id="fecha-badge"></span>
  </div>
  <div id="loader"><div class="spinner"></div><p style="color:#888">Cargando tabla de lotes...</p></div>
  <div id="tabla-container" style="display:none"></div>
  <div class="footer">Documento de consulta interna &bull; Sabor Pampeano</div>
</div>
<script>
document.getElementById('fecha-badge').textContent='Consultado: '+new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'});
google.script.run
  .withSuccessHandler(function(data){
    document.getElementById('loader').style.display='none';
    var c=document.getElementById('tabla-container');
    c.style.display='block';
    if(!data||!data.filas||data.filas.length===0){
      c.innerHTML='<div class="empty-state"><p><b>No hay datos en la tabla de Lotes.</b></p><p style="margin-top:8px">Pedile al administrador que cargue la información.</p></div>';
      return;
    }
    var html='<table><thead><tr>';
    data.encabezados.forEach(function(h){html+='<th>'+h+'</th>';});
    html+='</tr></thead><tbody>';
    data.filas.forEach(function(row){
      html+='<tr>';
      row.forEach(function(cell,i){
        var cls=i===0?'product-name':(i>0?'lote-num':'');
        html+='<td'+(cls?' class="'+cls+'"':'')+'>'+(cell||'-')+'</td>';
      });
      html+='</tr>';
    });
    html+='</tbody></table>';
    c.innerHTML=html;
  })
  .withFailureHandler(function(err){
    document.getElementById('loader').style.display='none';
    document.getElementById('tabla-container').style.display='block';
    document.getElementById('tabla-container').innerHTML='<p class="error-msg">Error: '+err.message+'</p>';
  })
  .obtenerLotes();
</script>
</body>
</html>
